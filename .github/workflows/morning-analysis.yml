name: 🕗 Generar Análisis Matutino MLB

on:
  schedule:
    # Ejecuta a las 12:00 UTC = 8:00 AM EDT
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  trigger-morning-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: 📤 Disparar análisis al bot
        run: |
          echo "⏰ Enviando /analisis al bot..."
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": ${{ secrets.ADMIN_CHAT_ID }}, \"text\": \"/analisis\"}" \
            --max-time 90)
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Análisis disparado"
          else
            echo "❌ Error: $HTTP_CODE"
            exit 1
          fi
